
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>葱哥 — 汉语新解</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-hover: #1f1f1f;
            --border: rgba(255, 255, 255, 0.06);
            --border-strong: rgba(255, 255, 255, 0.10);
            --text-primary: #f0f0f0;
            --text-secondary: #999;
            --text-muted: #666;
            --accent: #6366f1;
            --accent-dim: rgba(99, 102, 241, 0.15);
            --radius: 20px;
            --radius-sm: 12px;
            --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.4), 0 8px 32px rgba(0, 0, 0, 0.5);
            --transition: 200ms ease;
            --font-sans: 'Inter', 'Noto Serif SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-serif: 'Noto Serif SC', 'Noto Serif', Georgia, serif;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99, 102, 241, 0.08), transparent),
                radial-gradient(ellipse 60% 40% at 50% 110%, rgba(99, 102, 241, 0.04), transparent);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 32px 24px;
            line-height: 1.6;
        }

        /* ---------- 滚动条 ---------- */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.20);
        }

        /* ---------- 卡片 ---------- */
        .card {
            position: relative;
            width: 100%;
            max-width: 800px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border-color var(--transition);
        }
        .card:hover {
            border-color: var(--border-strong);
        }

        /* ---------- SVG 容器 ---------- */
        .svg-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 28px;
            max-height: 72vh;
            overflow-y: auto;
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(255, 255, 255, 0.012) 2px,
                    rgba(255, 255, 255, 0.012) 4px
                );
        }

        .svg-wrapper svg {
            width: 100%;
            height: auto;
            display: block;
            border-radius: var(--radius-sm);
        }

        /* ---------- 页脚 ---------- */
        .meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px 24px;
            padding: 18px 28px;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.01em;
        }
        .meta .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-dim);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 99px;
            font-weight: 500;
            font-size: 0.75rem;
            white-space: nowrap;
        }
        .meta .pill .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }
        .meta .prompt-hint {
            max-width: 320px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .divider {
            width: 1px;
            height: 14px;
            background: var(--border);
            flex-shrink: 0;
        }

        /* ---------- 响应式 ---------- */
        @media (max-width: 640px) {
            body {
                padding: 16px 12px;
            }
            .svg-wrapper {
                padding: 16px;
                max-height: 60vh;
            }
            .meta {
                padding: 14px 16px;
                font-size: 0.72rem;
                gap: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="svg-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&amp;display=swap');
      text {
        font-family: 'Noto Serif SC', 'Source Han Serif SC', 'Georgia', serif;
        dominant-baseline: middle;
        text-anchor: middle;
      }
      .title { font-size: 22px; font-weight: 700; letter-spacing: 4px; }
      .word { font-size: 36px; font-weight: 700; letter-spacing: 6px; }
      .pronounce { font-size: 13px; opacity: 0.65; letter-spacing: 1px; }
      .interpretation { font-size: 14px; line-height: 1.65; text-anchor: middle; }
      .summary { font-size: 11px; opacity: 0.55; letter-spacing: 1px; }
      .footnote { font-size: 10px; opacity: 0.45; }
    </style>
  </defs>

  <!-- 背景：古籍泛黄 #F0E6D2 -->
  <rect width="400" height="600" fill="#F0E6D2" rx="8" ry="8"/>
  
  <!-- 装饰几何：抽象葱形 淡褐色 #A8A090 opacity 0.18 -->
  <g transform="translate(340, 150)" opacity="0.18">
    <line x1="0" y1="0" x2="-40" y2="100" stroke="#A8A090" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="40" y2="100" stroke="#A8A090" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#A8A090" stroke-width="1.2"/>
    <path d="M-28,70 Q0,110 28,70" fill="none" stroke="#A8A090" stroke-width="1"/>
  </g>
  
  <g transform="translate(60, 480)" opacity="0.12">
    <line x1="0" y1="0" x2="-30" y2="80" stroke="#A8A090" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="30" y2="80" stroke="#A8A090" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#A8A090" stroke-width="1"/>
  </g>

  <!-- 标题区 -->
  <text x="200" y="55" class="title" fill="#2C3E50">汉语新解</text>
  <line x1="100" y1="70" x2="300" y2="70" stroke="#2C3E50" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.4"/>

  <!-- 核心词汇 -->
  <text x="200" y="135" class="word" fill="#2C3E50">葱哥</text>
  <text x="200" y="170" class="pronounce" fill="#2C3E50">cōng gē</text>
  
  <!-- 解释区域（自动换行 + 字数控制 60字内） -->
  <text x="200" y="220" class="interpretation" fill="#2C3E50">
    <tspan x="200" dy="0">站在阳台上指挥田野的人，</tspan>
    <tspan x="200" dy="24">以为挺拔就是硬道理，</tspan>
    <tspan x="200" dy="24">忘了自己根浅叶空。</tspan>
  </text>

  <!-- 批判性简笔线条：抽象人形 + 葱状冠顶 (讽刺“葱样空心但自诩挺拔”) -->
  <g transform="translate(200, 390)" stroke="#2C3E50" fill="none" stroke-width="1.3" opacity="0.7">
    <!-- 人形身体（正向站立，双臂微张，略有膨胀感） -->
    <circle cx="0" cy="-38" r="12"/>
    <line x1="0" y1="-26" x2="0" y2="10"/>
    <line x1="0" y1="-10" x2="-14" y2="-2"/>
    <line x1="0" y1="-10" x2="14" y2="-2"/>
    <line x1="0" y1="10" x2="-10" y2="32"/>
    <line x1="0" y1="10" x2="10" y2="32"/>
    
    <!-- 葱冠：三根直立细葱，空心感 -->
    <line x1="-8" y1="-48" x2="-8" y2="-76" stroke-width="1.8"/>
    <line x1="0" y1="-50" x2="0" y2="-82" stroke-width="2"/>
    <line x1="8" y1="-48" x2="8" y2="-74" stroke-width="1.8"/>
    
    <!-- 葱叶散开（讽刺“指点江山”） -->
    <path d="M-8,-76 Q-20,-88 -28,-82" stroke-width="1.2"/>
    <path d="M0,-82 Q2,-96 12,-94" stroke-width="1.2"/>
    <path d="M8,-74 Q18,-86 26,-80" stroke-width="1.2"/>
    
    <!-- 小旗子（虚弱摇动） -->
    <line x1="28" y1="-80" x2="48" y2="-88" stroke-width="0.8"/>
    <polygon points="48,-88 48,-74 58,-81" fill="none" stroke="#2C3E50" stroke-width="0.8" opacity="0.8"/>
  </g>

  <!-- 底部总结 -->
  <text x="200" y="540" class="summary" fill="#2C3E50">空心才需要被反复“拔高”</text>
  <text x="200" y="570" class="footnote" fill="#2C3E50">© 汉语新解 · 一针见血</text>
</svg>
        </div>
        <div class="meta">
            <span class="pill"><span class="dot"></span>汉语新解</span>
            <span class="divider"></span>
            <span>DeepSeek V4 Flash</span>
            <span class="divider"></span>
            <span class="prompt-hint" title="葱哥">葱哥</span>
        </div>
    </div>
</body>
</html>
