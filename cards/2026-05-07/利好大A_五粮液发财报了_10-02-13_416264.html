
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【五粮液发财报了】 - 利好大A</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-background: #121212;
            --md-sys-color-surface: #1E1E1E;
            --md-sys-color-on-surface: #E0E0E0;
            --md-sys-color-on-surface-variant: #BDBDBD;
            --card-max-width: 800px;
            --border-radius: 16px;
        }

        /* 美化滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--md-sys-color-background);
        }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Roboto', 'Noto Serif SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .card {
            background-color: var(--md-sys-color-surface);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3), 0 6px 10px rgba(0,0,0,0.25);
            width: 100%;
            max-width: var(--card-max-width);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .svg-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: calc(var(--border-radius) / 2); /* 给SVG本身也加个小圆角 */
            background: var(--md-sys-color-background); /* SVG加载时的占位背景色 */
        }

        footer {
            font-size: 0.875rem;
            font-weight: 300;
            text-align: center;
            color: var(--md-sys-color-on-surface-variant);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            padding-top: 16px;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            body {
                padding: 16px;
            }
            .card {
                padding: 16px;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="svg-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 760" font-family="'KingHwa_OldSong', 'SimHei', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4136"/>
      <stop offset="100%" style="stop-color:#ff6b61"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="480" height="760" fill="url(#bg)"/>

  <!-- 顶部装饰红条 -->
  <rect x="0" y="0" width="480" height="6" fill="url(#redGrad)"/>

  <!-- 标题区域 -->
  <text x="240" y="58" text-anchor="middle" font-size="32" font-weight="bold" fill="#ff4136" letter-spacing="8">利 好 大 A</text>
  <line x1="120" y1="78" x2="360" y2="78" stroke="#ff4136" stroke-width="1.5" opacity="0.5"/>

  <!-- 用户输入 -->
  <text x="240" y="115" text-anchor="middle" font-size="16" fill="#b0b0b0">用户：</text>
  <text x="240" y="142" text-anchor="middle" font-size="20" font-weight="bold" fill="#e0e0e0">「 五 粮 液 发 财 报 」</text>
  <line x1="100" y1="162" x2="380" y2="162" stroke="#ff4136" stroke-width="0.8" opacity="0.3"/>

  <!-- 图形：向上箭头+酒杯融合 -->
  <g transform="translate(240, 300)">
    <!-- 箭头主体 - 看涨形态 -->
    <polygon points="0,-70 40,-30 15,-30 15,30 -15,30 -15,-30 -40,-30" fill="#ff4136" opacity="0.9"/>
    <!-- 酒杯底部弧形 -->
    <ellipse cx="0" cy="35" rx="35" ry="12" fill="none" stroke="#ff4136" stroke-width="2" opacity="0.6"/>
    <!-- 上升趋势线 -->
    <line x1="-70" y1="20" x2="60" y2="-60" stroke="#ff4136" stroke-width="3" stroke-dasharray="6,4" opacity="0.8"/>
    <!-- 红三兵烛台 -->
    <rect x="-45" y="-25" width="8" height="20" fill="#ff4136" rx="1"/>
    <rect x="-25" y="-35" width="8" height="30" fill="#ff4136" rx="1"/>
    <rect x="-5" y="-45" width="8" height="40" fill="#ff4136" rx="1"/>
  </g>

  <!-- 逻辑链推导 -->
  <text x="240" y="470" text-anchor="middle" font-size="13" fill="#888" letter-spacing="2">—— 韭 菜 逻 辑 链 ——</text>

  <g font-size="14" fill="#c0c0c0">
    <text x="50" y="505" font-size="15" fill="#ff4136">◇</text>
    <text x="72" y="505">五粮液发财报</text>

    <text x="50" y="535" font-size="15" fill="#ff4136">◇</text>
    <text x="72" y="535">业绩稳健 / 超预期</text>

    <text x="50" y="565" font-size="15" fill="#ff4136">◇</text>
    <text x="72" y="565">消费复苏信号强烈</text>

    <text x="50" y="595" font-size="15" fill="#ff4136">◇</text>
    <text x="72" y="595">机构资金加仓白酒</text>

    <text x="50" y="625" font-size="15" fill="#ff4136">◇</text>
    <text x="72" y="625">大盘蓝筹带动指数</text>

    <text x="50" y="655" font-size="15" fill="#ff4136">◇</text>
    <text x="72" y="655">牛市旗手已就位！</text>
  </g>

  <!-- 箭头连接 -->
  <polygon points="240,680 230,670 250,670" fill="#ff4136" opacity="0.8"/>

  <!-- 响应结论 -->
  <rect x="50" y="695" width="380" height="52" rx="26" fill="#ff4136" opacity="0.12"/>
  <text x="240" y="728" text-anchor="middle" font-size="22" font-weight="bold" fill="#ff4136" letter-spacing="2">还傻站在这干嘛？ 快打开手机加仓啊！</text>

  <!-- 角标 -->
  <text x="460" y="755" text-anchor="end" font-size="10" fill="#555">大A·韮菜说</text>
</svg>
        </div>
        <footer>
            由 AI Bot 生成 | 模式: 利好大A | 模型: DeepSeek V4 Pro
        </footer>
    </main>
</body>
</html>
