
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>葱哥短 — 汉语新解</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-hover: #1f1f1f;
            --border: rgba(255, 255, 255, 0.06);
            --border-strong: rgba(255, 255, 255, 0.10);
            --text-primary: #f0f0f0;
            --text-secondary: #999;
            --text-muted: #666;
            --accent: #6366f1;
            --accent-dim: rgba(99, 102, 241, 0.15);
            --radius: 20px;
            --radius-sm: 12px;
            --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.4), 0 8px 32px rgba(0, 0, 0, 0.5);
            --transition: 200ms ease;
            --font-sans: 'Inter', 'Noto Serif SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-serif: 'Noto Serif SC', 'Noto Serif', Georgia, serif;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99, 102, 241, 0.08), transparent),
                radial-gradient(ellipse 60% 40% at 50% 110%, rgba(99, 102, 241, 0.04), transparent);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 32px 24px;
            line-height: 1.6;
        }

        /* ---------- 滚动条 ---------- */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.20);
        }

        /* ---------- 卡片 ---------- */
        .card {
            position: relative;
            width: 100%;
            max-width: 800px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border-color var(--transition);
        }
        .card:hover {
            border-color: var(--border-strong);
        }

        /* ---------- SVG 容器 ---------- */
        .svg-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 28px;
            max-height: 72vh;
            overflow-y: auto;
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(255, 255, 255, 0.012) 2px,
                    rgba(255, 255, 255, 0.012) 4px
                );
        }

        .svg-wrapper svg {
            width: 100%;
            height: auto;
            display: block;
            border-radius: var(--radius-sm);
        }

        /* ---------- 页脚 ---------- */
        .meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px 24px;
            padding: 18px 28px;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.01em;
        }
        .meta .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-dim);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 99px;
            font-weight: 500;
            font-size: 0.75rem;
            white-space: nowrap;
        }
        .meta .pill .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }
        .meta .prompt-hint {
            max-width: 320px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .divider {
            width: 1px;
            height: 14px;
            background: var(--border);
            flex-shrink: 0;
        }

        /* ---------- 响应式 ---------- */
        @media (max-width: 640px) {
            body {
                padding: 16px 12px;
            }
            .svg-wrapper {
                padding: 16px;
                max-height: 60vh;
            }
            .meta {
                padding: 14px 16px;
                font-size: 0.72rem;
                gap: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="svg-wrapper">
            说吧, 他们又用哪个词来忽悠你了?
我无法生成这张SVG卡片，因为提示中的 **“葱哥短”** 似乎不是一个有意义的中文词汇，更像是一个随机的或私人化的短语。为了能用我“一针见血、讽刺幽默”的风格为你创作，请换一个**真实存在的、具有社会或人性观察价值的汉语词汇**（例如：内卷、自律、情怀、上岸、格局、甩锅、安全感、优先级等）。

期待你的新词，我备好“剑刃上的止痛药”了。
        </div>
        <div class="meta">
            <span class="pill"><span class="dot"></span>汉语新解</span>
            <span class="divider"></span>
            <span>DeepSeek V4 Flash</span>
            <span class="divider"></span>
            <span class="prompt-hint" title="葱哥短">葱哥短</span>
        </div>
    </div>
</body>
</html>
