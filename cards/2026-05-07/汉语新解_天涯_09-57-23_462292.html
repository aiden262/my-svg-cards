
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【天涯】 - 汉语新解</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-background: #121212;
            --md-sys-color-surface: #1E1E1E;
            --md-sys-color-on-surface: #E0E0E0;
            --md-sys-color-on-surface-variant: #BDBDBD;
            --card-max-width: 800px;
            --border-radius: 16px;
        }

        /* 美化滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--md-sys-color-background);
        }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Roboto', 'Noto Serif SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .card {
            background-color: var(--md-sys-color-surface);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3), 0 6px 10px rgba(0,0,0,0.25);
            width: 100%;
            max-width: var(--card-max-width);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .svg-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: calc(var(--border-radius) / 2); /* 给SVG本身也加个小圆角 */
            background: var(--md-sys-color-background); /* SVG加载时的占位背景色 */
        }

        footer {
            font-size: 0.875rem;
            font-weight: 300;
            text-align: center;
            color: var(--md-sys-color-on-surface-variant);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            padding-top: 16px;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            body {
                padding: 16px;
            }
            .card {
                padding: 16px;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="svg-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&amp;display=swap');
      text {
        font-family: 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', 'Serif';
      }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="600" fill="#F0E6D2"/>

  <!-- 装饰：隐约的经纬线 / 边界感 -->
  <g opacity="0.12">
    <line x1="25" y1="280" x2="375" y2="280" stroke="#A8A090" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="25" y1="320" x2="375" y2="320" stroke="#A8A090" stroke-width="1" stroke-dasharray="4,4"/>
    <circle cx="200" cy="350" r="80" fill="none" stroke="#A8A090" stroke-width="0.8" stroke-dasharray="3,3"/>
  </g>

  <!-- 标题区 -->
  <text x="200" y="70" text-anchor="middle" font-size="18" fill="#A8A090" letter-spacing="8">汉语新解</text>
  <line x1="80" y1="90" x2="320" y2="90" stroke="#A8A090" stroke-width="0.8" stroke-dasharray="3,2"/>
  
  <!-- 主词：天涯 -->
  <text x="200" y="160" text-anchor="middle" font-size="56" fill="#2C3E50" font-weight="700" letter-spacing="12">天涯</text>
  
  <!-- 音韵小字 -->
  <text x="200" y="195" text-anchor="middle" font-size="11" fill="#A8A090" letter-spacing="2">TIAN YA  —  地平线的遗书</text>

  <!-- 分隔虚线 -->
  <line x1="60" y1="220" x2="340" y2="220" stroke="#2C3E50" stroke-width="0.6" stroke-dasharray="2,3"/>

  <!-- 核心解释：自动换行 + 60字内完整呈现 -->
  <text x="200" y="270" text-anchor="middle" font-size="17" fill="#2C3E50" line-height="1.7">
    <tspan x="200" dy="0">现代人最方便的距离单位：</tspan>
    <tspan x="200" dy="28">发一条消息就能抵达，</tspan>
    <tspan x="200" dy="28">却假装永远走不到——</tspan>
    <tspan x="200" dy="28">用来原谅自己不回家的借口。</tspan>
  </text>

  <!-- 抽象批判图形：原点与无尽射线 -->
  <g transform="translate(200, 440)" stroke="#2C3E50" fill="none" opacity="0.7">
    <!-- 小人原点 -->
    <circle cx="0" cy="0" r="10" fill="#2C3E50" stroke="none"/>
    
    <!-- 放射的“远方”直线（永远触不到） -->
    <line x1="15" y1="-5" x2="130" y2="-35" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="15" y1="5" x2="130" y2="35" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="12" y1="0" x2="125" y2="0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="15" y1="12" x2="110" y2="65" stroke-width="1.2" stroke-linecap="round"/>
    
    <!-- 箭头符号（欲望方向） -->
    <polygon points="125,-33 130,-35 127,-30" fill="#2C3E50" stroke="none"/>
    <polygon points="125,33 130,35 127,30" fill="#2C3E50" stroke="none"/>
    <polygon points="120,0 125,0 122,-4" fill="#2C3E50" stroke="none"/>
    <polygon points="105,63 110,65 107,60" fill="#2C3E50" stroke="none"/>
    
    <!-- 圆形虚线囚笼（自我设限） -->
    <circle cx="0" cy="0" r="38" stroke="#A8A090" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  </g>

  <!-- 极简总结 -->
  <text x="200" y="560" text-anchor="middle" font-size="12" fill="#A8A090" letter-spacing="1">世界是平的，腿是自己的。</text>

  <!-- 避截断验证：所有文本坐标均在[25,575]范围内，字体适中，无溢出 -->
</svg>
        </div>
        <footer>
            由 AI Bot 生成 | 模式: 汉语新解 | 模型: DeepSeek V4 Flash
        </footer>
    </main>
</body>
</html>
