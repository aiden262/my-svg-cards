
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【葱哥概念】 - 利好大A</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-background: #121212;
            --md-sys-color-surface: #1E1E1E;
            --md-sys-color-on-surface: #E0E0E0;
            --md-sys-color-on-surface-variant: #BDBDBD;
            --card-max-width: 800px;
            --border-radius: 16px;
        }

        /* 美化滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--md-sys-color-background);
        }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Roboto', 'Noto Serif SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .card {
            background-color: var(--md-sys-color-surface);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3), 0 6px 10px rgba(0,0,0,0.25);
            width: 100%;
            max-width: var(--card-max-width);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .svg-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: calc(var(--border-radius) / 2); /* 给SVG本身也加个小圆角 */
            background: var(--md-sys-color-background); /* SVG加载时的占位背景色 */
        }

        footer {
            font-size: 0.875rem;
            font-weight: 300;
            text-align: center;
            color: var(--md-sys-color-on-surface-variant);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            padding-top: 16px;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            body {
                padding: 16px;
            }
            .card {
                padding: 16px;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="svg-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 760" width="480" height="760">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&amp;display=swap');
      text {
        font-family: 'Noto Serif SC', 'KingHwa_OldSong', 'SimHei', serif;
      }
      .title { font-size: 32px; font-weight: 900; fill: #ff4136; letter-spacing: 4px; }
      .subtitle { font-size: 14px; fill: #888; }
      .user-input { font-size: 22px; font-weight: 700; fill: #e0e0e0; background-color: #333; padding: 12px; rx: 8px; }
      .logic-label { font-size: 14px; font-weight: 700; fill: #ff4136; letter-spacing: 2px; }
      .logic-text { font-size: 16px; fill: #c0c0c0; line-height: 1.6; }
      .response { font-size: 28px; font-weight: 900; fill: #ff4136; letter-spacing: 2px; }
      .line { stroke: #333; stroke-width: 2; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="480" height="760" fill="#1c1c1c" />

  <!-- 顶部装饰线 -->
  <rect x="40" y="30" width="400" height="2" fill="#ff4136" />

  <!-- 标题 -->
  <text x="240" y="75" text-anchor="middle" class="title">利好大A</text>
  <text x="240" y="100" text-anchor="middle" class="subtitle">~ 这事儿跟股市必须得有关系 ~</text>

  <!-- 用户输入区 -->
  <rect x="80" y="130" width="320" height="50" rx="8" fill="#2a2a2a" stroke="#444" stroke-width="1" />
  <text x="240" y="162" text-anchor="middle" class="user-input">“葱哥概念”</text>

  <!-- 图形：葱形火箭（抽象表现） -->
  <g transform="translate(240, 240)">
    <!-- 火箭尾焰（葱叶变形） -->
    <path d="M -20,40 Q -30,80 -10,110 Q 0,120 10,110 Q 30,80 20,40 Z" fill="#2e8b57" />
    <path d="M -10,40 Q -15,70 -5,95 Q 0,105 5,95 Q 15,70 10,40 Z" fill="#3cb371" />
    
    <!-- 火箭主体（葱白/上涨K线） -->
    <path d="M -35,-60 L -45,40 L -20,40 L -10,-30 L 10,-30 L 20,40 L 45,40 L 35,-60 Z" fill="#ff4136" />
    
    <!-- 火箭窗户（葱眼） -->
    <circle cx="0" cy="-15" r="12" fill="#1c1c1c" />
    <circle cx="0" cy="-15" r="8" fill="#e0e0e0" />
    <circle cx="3" cy="-18" r="2" fill="#1c1c1c" />
    
    <!-- 火箭顶部（葱尖） -->
    <path d="M -15,-60 L 0,-95 L 15,-60 Z" fill="#ff4500" />
    
    <!-- 文字 -->
    <text x="0" y="20" text-anchor="middle" font-size="16" font-weight="900" fill="#1c1c1c">A股</text>
  </g>

  <!-- 分隔线 -->
  <line x1="80" y1="360" x2="400" y2="360" class="line" stroke-dasharray="4" />
  <rect x="220" y="354" width="40" height="12" fill="#ff4136" />

  <!-- 逻辑链推导区 -->
  <text x="80" y="420" class="logic-label">核心推导逻辑：</text>

  <g class="logic-text">
    <text x="80" y="460">
      <tspan x="80" dy="0">1. 葱哥概念 → 农村网红经济爆发</tspan>
    </text>
    <text x="80" y="500">
      <tspan x="80" dy="0">2. 直播带货农产品 → 农业股估值重塑</tspan>
    </text>
    <text x="80" y="540">
      <tspan x="80" dy="0">3. 小葱虽小，牵动大消费 → 政策力度加码</tspan>
    </text>
    <text x="80" y="580">
      <tspan x="80" dy="0">4. 流量+风口+资金 → 顺势而为，跑步进场！</tspan>
    </text>
  </g>

  <!-- 底部大号响应 -->
  <rect x="60" y="640" width="360" height="60" rx="10" fill="none" stroke="#ff4136" stroke-width="2" />
  <text x="240" y="680" text-anchor="middle" class="response">这还不得跑步进场啊！</text>

  <!-- 底部装饰线 -->
  <rect x="40" y="730" width="400" height="2" fill="#ff4136" />
</svg>
        </div>
        <footer>
            由 AI Bot 生成 | 模式: 利好大A | 模型: DeepSeek V4 Pro
        </footer>
    </main>
</body>
</html>
