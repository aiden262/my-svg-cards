
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【葱哥概念】 - 利好大A</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-background: #121212;
            --md-sys-color-surface: #1E1E1E;
            --md-sys-color-on-surface: #E0E0E0;
            --md-sys-color-on-surface-variant: #BDBDBD;
            --card-max-width: 800px;
            --border-radius: 16px;
        }

        /* 美化滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--md-sys-color-background);
        }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Roboto', 'Noto Serif SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .card {
            background-color: var(--md-sys-color-surface);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3), 0 6px 10px rgba(0,0,0,0.25);
            width: 100%;
            max-width: var(--card-max-width);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .svg-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: calc(var(--border-radius) / 2); /* 给SVG本身也加个小圆角 */
            background: var(--md-sys-color-background); /* SVG加载时的占位背景色 */
        }

        footer {
            font-size: 0.875rem;
            font-weight: 300;
            text-align: center;
            color: var(--md-sys-color-on-surface-variant);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            padding-top: 16px;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            body {
                padding: 16px;
            }
            .card {
                padding: 16px;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="svg-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 760" style="background-color: #1c1c1c; font-family: 'KingHwa_OldSong', 'STSong', serif;">
  <defs>
    <!-- 立体投射阴影滤镜 -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 顶部标题区 -->
  <rect x="0" y="0" width="480" height="90" fill="#2a2a2a" />
  <text x="240" y="55" font-size="36" font-weight="bold" fill="#ff4136" text-anchor="middle" letter-spacing="8" filter="url(#glow)">利好大A</text>
  <line x1="40" y1="80" x2="440" y2="80" stroke="#ff4136" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- 用户输入区域 -->
  <rect x="40" y="110" width="400" height="60" rx="8" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <text x="240" y="148" font-size="24" fill="#e0e0e0" text-anchor="middle" font-weight="bold">葱哥概念</text>

  <!-- 图形：一根寓意“葱”元素的K线火箭 -->
  <g transform="translate(240, 340)" filter="url(#shadow)">
    <!-- 葱叶部分（K线实体向上突破） -->
    <path d="M-20,0 L-20,-80 Q0,-110 20,-80 L20,0 Z" fill="#ff4136" opacity="0.9"/>
    <!-- 葱白部分（K线下影线/成交量放大） -->
    <rect x="-15" y="0" width="30" height="40" fill="#ff4136" opacity="0.6"/>
    <rect x="-25" y="40" width="50" height="15" fill="#ff4136" opacity="0.4"/>
    <!-- 根须（资金辐射） -->
    <path d="M-15,55 Q-30,75 -40,70" stroke="#ff4136" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0,55 Q0,80 -5,95" stroke="#ff4136" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M15,55 Q30,75 40,70" stroke="#ff4136" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- 火箭火焰效果 -->
    <path d="M-10,95 L0,120 L10,95 Z" fill="#ffa500" opacity="0.8"/>
    <path d="M-5,120 L0,140 L5,120 Z" fill="#ffd700" opacity="0.6"/>
  </g>

  <!-- 逻辑链推导（解读） -->
  <rect x="30" y="460" width="420" height="160" rx="10" fill="#242424" stroke="#333" stroke-width="1"/>
  <text x="240" y="490" font-size="18" fill="#ff4136" text-anchor="middle" font-weight="bold">【韭菜式逻辑推导】</text>
  
  <text x="55" y="525" font-size="16" fill="#c0c0c0">1. 提取关键词：葱（聪）、哥（大哥）</text>
  <text x="55" y="555" font-size="16" fill="#c0c0c0">2. 生成关联概念：聪明资金、行业大哥</text>
  <text x="55" y="585" font-size="16" fill="#c0c0c0">3. 强行关联A股：大哥带领聪明钱进场扫货！</text>
  <text x="55" y="615" font-size="16" fill="#c0c0c0">4. 乐观解读：新主线诞生，情绪冰点已过，反转！</text>

  <!-- 分隔装饰线 -->
  <line x1="40" y1="640" x2="440" y2="640" stroke="#ff4136" stroke-width="1" stroke-dasharray="2 6"/>

  <!-- 响应结论区 -->
  <text x="240" y="685" font-size="32" fill="#ff4136" text-anchor="middle" font-weight="bold" filter="url(#shadow)">这还不得跑步进场啊！</text>
  
  <!-- 底部韭菜寄语 -->
  <text x="240" y="735" font-size="14" fill="#666" text-anchor="middle">风险提示：本推演纯属戏谑，投资需谨慎。</text>
</svg>
        </div>
        <footer>
            由 AI Bot 生成 | 模式: 利好大A | 模型: DeepSeek V4 Pro
        </footer>
    </main>
</body>
</html>
