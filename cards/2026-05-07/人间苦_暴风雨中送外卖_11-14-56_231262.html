
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【暴风雨中送外卖】 - 人间苦</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-background: #121212;
            --md-sys-color-surface: #1E1E1E;
            --md-sys-color-on-surface: #E0E0E0;
            --md-sys-color-on-surface-variant: #BDBDBD;
            --card-max-width: 800px;
            --border-radius: 16px;
        }

        /* 美化滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--md-sys-color-background);
        }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Roboto', 'Noto Serif SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .card {
            background-color: var(--md-sys-color-surface);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3), 0 6px 10px rgba(0,0,0,0.25);
            width: 100%;
            max-width: var(--card-max-width);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .svg-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: calc(var(--border-radius) / 2); /* 给SVG本身也加个小圆角 */
            background: var(--md-sys-color-background); /* SVG加载时的占位背景色 */
        }

        footer {
            font-size: 0.875rem;
            font-weight: 300;
            text-align: center;
            color: var(--md-sys-color-on-surface-variant);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            padding-top: 16px;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            body {
                padding: 16px;
            }
            .card {
                padding: 16px;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="svg-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 540" width="480" height="540">
  <rect width="480" height="540" fill="#F3EFEA"/>
  <g font-family="'Noto Serif SC', serif" text-anchor="middle">
    <text x="240" y="70" font-size="32" fill="#414141" font-weight="500">人间苦</text>
    <line x1="120" y1="95" x2="360" y2="95" stroke="#B0A89F" stroke-width="1"/>
    <text x="240" y="130" font-size="18" fill="#707070" font-style="italic">暴风雨中送外卖</text>
    
    <text x="240" y="185" font-size="16" fill="#414141" line-height="1.8" text-anchor="middle">
      <tspan x="240" dy="0">雨砸在头盔上，砰砰砰的。</tspan>
      <tspan x="240" dy="28">手机屏幕花了，订单剩七分钟。</tspan>
      <tspan x="240" dy="28">电动车淌过小腿深的水，</tspan>
      <tspan x="240" dy="28">我不知道能不能骑过去。</tspan>
      <tspan x="240" dy="28">风把雨衣吹起来，</tspan>
      <tspan x="240" dy="28">整个人往下坠。</tspan>
      <tspan x="240" dy="28">有个骑手在水里推车，</tspan>
      <tspan x="240" dy="28">他没看我，我也没看他。</tspan>
      <tspan x="240" dy="28">到了楼上，</tspan>
      <tspan x="240" dy="28">那女人接过餐盒，</tspan>
      <tspan x="240" dy="28">门就关上了。</tspan>
      <tspan x="240" dy="28">雨水顺着裤腿往下淌，</tspan>
      <tspan x="240" dy="28">地上像尿了一样。</tspan>
      <tspan x="240" dy="28">下一单还有八分钟，</tspan>
      <tspan x="240" dy="28">活着就送，送到就死。</tspan>
    </text>
  </g>
</svg>
        </div>
        <footer>
            由 AI Bot 生成 | 模式: 人间苦 | 模型: DeepSeek V4 Flash
        </footer>
    </main>
</body>
</html>
