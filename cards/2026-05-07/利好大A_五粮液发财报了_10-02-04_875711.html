
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【五粮液发财报了】 - 利好大A</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-background: #121212;
            --md-sys-color-surface: #1E1E1E;
            --md-sys-color-on-surface: #E0E0E0;
            --md-sys-color-on-surface-variant: #BDBDBD;
            --card-max-width: 800px;
            --border-radius: 16px;
        }

        /* 美化滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--md-sys-color-background);
        }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Roboto', 'Noto Serif SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .card {
            background-color: var(--md-sys-color-surface);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3), 0 6px 10px rgba(0,0,0,0.25);
            width: 100%;
            max-width: var(--card-max-width);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .svg-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: calc(var(--border-radius) / 2); /* 给SVG本身也加个小圆角 */
            background: var(--md-sys-color-background); /* SVG加载时的占位背景色 */
        }

        footer {
            font-size: 0.875rem;
            font-weight: 300;
            text-align: center;
            color: var(--md-sys-color-on-surface-variant);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            padding-top: 16px;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            body {
                padding: 16px;
            }
            .card {
                padding: 16px;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="svg-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 760" font-family="'KingHwa_OldSong', 'STSong', 'SimSun', serif">
  <rect width="480" height="760" fill="#1c1c1c"/>

  <!-- 标题区域 -->
  <text x="240" y="55" text-anchor="middle" font-size="28" fill="#ff4136" font-weight="bold">利好大A</text>
  <line x1="80" y1="75" x2="400" y2="75" stroke="#ff4136" stroke-width="1.5" opacity="0.6"/>
  <line x1="120" y1="82" x2="360" y2="82" stroke="#ff4136" stroke-width="1" opacity="0.3"/>

  <!-- 用户输入 -->
  <text x="240" y="125" text-anchor="middle" font-size="18" fill="#e0e0e0">「五粮液发财报了」</text>

  <!-- 极简图形 —— 上升箭头，暗示利好 -->
  <polygon points="200,190 280,190 250,150" fill="#ff4136" opacity="0.85"/>
  <rect x="232" y="190" width="36" height="30" fill="#ff4136" opacity="0.6"/>

  <!-- 逻辑链推导 -->
  <text x="80" y="255" font-size="13" fill="#ff4136" opacity="0.8">逻辑推导</text>
  <line x1="80" y1="265" x2="400" y2="265" stroke="#ff4136" stroke-width="0.8" opacity="0.4"/>

  <!-- 关键词与关联步骤 -->
  <text x="80" y="295" font-size="14" fill="#e0e0e0">▸ 五粮液 · 发财报</text>
  <text x="100" y="325" font-size="14" fill="#e0e0e0">▸ 利润增长 → 消费复苏</text>
  <text x="100" y="355" font-size="14" fill="#e0e0e0">▸ 消费复苏 → GDP 稳了</text>
  <text x="100" y="385" font-size="14" fill="#e0e0e0">▸ GDP 稳了 → 政策继续放水</text>
  <text x="100" y="415" font-size="14" fill="#e0e0e0">▸ 放水 → 利好大A 全体板块</text>

  <!-- 箭头 —— 强行关联 -->
  <line x1="120" y1="435" x2="360" y2="435" stroke="#ff4136" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#ff4136"/>
    </marker>
  </defs>

  <text x="240" y="465" text-anchor="middle" font-size="13" fill="#ff4136" opacity="0.7">（强行关联股市 · 乐观解读一切）</text>

  <!-- 分隔线 -->
  <line x1="60" y1="500" x2="420" y2="500" stroke="#ff4136" stroke-width="1" opacity="0.3"/>

  <!-- 响应 —— 随机结论 -->
  <text x="240" y="555" text-anchor="middle" font-size="26" fill="#ff4136" font-weight="bold">这事呀，利好大A！</text>

  <!-- 底部幽默小字 -->
  <text x="240" y="610" text-anchor="middle" font-size="12" fill="#e0e0e0" opacity="0.5">还傻站在这干嘛？快打开手机加仓啊！</text>

  <!-- 韭菜小标记 -->
  <text x="240" y="730" text-anchor="middle" font-size="11" fill="#e0e0e0" opacity="0.35">—— 韭 菜 视 角 ——</text>
</svg>
        </div>
        <footer>
            由 AI Bot 生成 | 模式: 利好大A | 模型: DeepSeek V4 Flash
        </footer>
    </main>
</body>
</html>
