
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【葱哥概念】 - 利好大A</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-background: #121212;
            --md-sys-color-surface: #1E1E1E;
            --md-sys-color-on-surface: #E0E0E0;
            --md-sys-color-on-surface-variant: #BDBDBD;
            --card-max-width: 800px;
            --border-radius: 16px;
        }

        /* 美化滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--md-sys-color-background);
        }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Roboto', 'Noto Serif SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .card {
            background-color: var(--md-sys-color-surface);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3), 0 6px 10px rgba(0,0,0,0.25);
            width: 100%;
            max-width: var(--card-max-width);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .svg-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: calc(var(--border-radius) / 2); /* 给SVG本身也加个小圆角 */
            background: var(--md-sys-color-background); /* SVG加载时的占位背景色 */
        }

        footer {
            font-size: 0.875rem;
            font-weight: 300;
            text-align: center;
            color: var(--md-sys-color-on-surface-variant);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            padding-top: 16px;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            body {
                padding: 16px;
            }
            .card {
                padding: 16px;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="svg-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 760" width="480" height="760" style="background-color: #1c1c1c; font-family: 'KingHwa_OldSong', 'Songti SC', 'Noto Serif SC', serif;">
  
  <style>
    text {
      fill: #e0e0e0;
      font-size: 14px;
      dominant-baseline: middle;
      text-anchor: middle;
    }
    .title {
      font-size: 42px;
      font-weight: bold;
      fill: #ff4136;
      text-anchor: middle;
      letter-spacing: 8px;
    }
    .subtitle {
      font-size: 16px;
      fill: #888;
      text-anchor: middle;
    }
    .divider {
      stroke: #ff4136;
      stroke-width: 1.5;
      stroke-dasharray: 4 4;
    }
    .user-input {
      font-size: 20px;
      font-weight: bold;
      fill: #ff4136;
      text-anchor: middle;
    }
    .logic-step {
      font-size: 13px;
      fill: #bbb;
      text-anchor: middle;
    }
    .logic-arrow {
      fill: #ff4136;
      font-size: 18px;
      text-anchor: middle;
    }
    .response {
      font-size: 28px;
      font-weight: bold;
      fill: #ff4136;
      text-anchor: middle;
      letter-spacing: 2px;
    }
    .graphic-line {
      stroke: #ff4136;
      stroke-width: 2;
      fill: none;
    }
    .small-note {
      font-size: 10px;
      fill: #666;
      text-anchor: middle;
    }
  </style>

  <!-- 标题 -->
  <text x="240" y="60" class="title">利好大A</text>
  <text x="240" y="85" class="subtitle">—— 一切消息皆利好 ——</text>

  <!-- 分隔线 -->
  <line x1="60" y1="105" x2="420" y2="105" class="divider"/>

  <!-- 用户输入 -->
  <text x="240" y="145" class="user-input">「葱哥概念」</text>
  <text x="240" y="170" class="small-note">市场新词·情绪焦点</text>

  <!-- 极简图形：K线向上的箭头 + 葱形意象 -->
  <g transform="translate(240, 280)">
    <!-- 抽象葱形（三角形+短线），象征涨势 -->
    <polygon points="0,-60 -20,0 20,0" fill="#ff4136" opacity="0.9"/>
    <line x1="0" y1="-60" x2="0" y2="-85" class="graphic-line" stroke-width="3"/>
    <!-- 根须 -->
    <line x1="-8" y1="0" x2="-15" y2="12" class="graphic-line" stroke-width="1.5"/>
    <line x1="8" y1="0" x2="15" y2="12" class="graphic-line" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="14" class="graphic-line" stroke-width="1.5"/>
    <!-- 绿叶（上涨的翅膀） -->
    <path d="M-20,0 Q-40,-20 -30,-40" class="graphic-line" stroke-width="2"/>
    <path d="M20,0 Q40,-20 30,-40" class="graphic-line" stroke-width="2"/>
  </g>

  <!-- 逻辑链推导（解读） -->
  <g transform="translate(240, 360)">
    <text x="0" y="0" class="logic-step">提取关键词：葱 · 哥 · 概念</text>
    <text x="0" y="22" class="logic-step">生成关联：农业 → 涨价 → 消费 → 热钱</text>
    <text x="0" y="44" class="logic-step">强行关联A股：葱类种植业、网红IP、元宇宙“葱哥”</text>
    <text x="0" y="66" class="logic-step">乐观解读：新概念带动游资，散户跟风必涨</text>
    <text x="0" y="92" class="logic-arrow">▼ 逻辑闭环 ▼</text>
  </g>

  <!-- 分隔线 -->
  <line x1="60" y1="490" x2="420" y2="490" class="divider"/>

  <!-- 响应结论 -->
  <text x="240" y="540" class="response">这事呀，利好大A！</text>
  <text x="240" y="580" class="response" style="font-size: 20px;">还傻站在这干嘛？</text>
  <text x="240" y="610" class="response" style="font-size: 20px;">快打开手机加仓啊！</text>

  <!-- 底部装饰K线 -->
  <g transform="translate(240, 680)">
    <line x1="-80" y1="0" x2="-30" y2="0" class="graphic-line"/>
    <line x1="-55" y1="-15" x2="-55" y2="15" class="graphic-line"/>
    <rect x="-30" y="-8" width="20" height="16" fill="#ff4136" opacity="0.6"/>
    <rect x="-5" y="-4" width="20" height="8" fill="#ff4136" opacity="0.4"/>
    <rect x="20" y="-12" width="20" height="24" fill="#ff4136" opacity="0.8"/>
    <text x="70" y="5" class="small-note">↑ 主升浪启动 ↑</text>
  </g>

</svg>
        </div>
        <footer>
            由 AI Bot 生成 | 模式: 利好大A | 模型: DeepSeek V4 Flash
        </footer>
    </main>
</body>
</html>
