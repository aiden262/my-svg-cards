
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楠姐 — 汉语新解</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-hover: #1f1f1f;
            --border: rgba(255, 255, 255, 0.06);
            --border-strong: rgba(255, 255, 255, 0.10);
            --text-primary: #f0f0f0;
            --text-secondary: #999;
            --text-muted: #666;
            --accent: #6366f1;
            --accent-dim: rgba(99, 102, 241, 0.15);
            --radius: 20px;
            --radius-sm: 12px;
            --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.4), 0 8px 32px rgba(0, 0, 0, 0.5);
            --transition: 200ms ease;
            --font-sans: 'Inter', 'Noto Serif SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-serif: 'Noto Serif SC', 'Noto Serif', Georgia, serif;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            overflow: hidden;
            height: 100%;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99, 102, 241, 0.08), transparent),
                radial-gradient(ellipse 60% 40% at 50% 110%, rgba(99, 102, 241, 0.04), transparent);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 8px;
            line-height: 1.6;
            overflow: hidden;
        }

        /* ---------- 卡片 ---------- */
        .card {
            position: relative;
            width: 100%;
            max-width: 800px;
            max-height: calc(100vh - 16px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border-color var(--transition);
        }
        .card:hover {
            border-color: var(--border-strong);
        }

        /* ---------- SVG 容器 ---------- */
        .svg-wrapper {
            flex: 1;
            min-height: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            cursor: zoom-in;
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(255, 255, 255, 0.012) 2px,
                    rgba(255, 255, 255, 0.012) 4px
                );
            overflow: hidden;
        }

        .svg-wrapper svg {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            display: block;
            border-radius: var(--radius-sm);
            transition: transform var(--transition);
        }

        .svg-wrapper:hover svg {
            transform: scale(1.01);
        }

        /* ---------- 底部渐变遮罩（暗示有更多内容） ---------- */
        .svg-fade {
            position: absolute;
            inset: auto 0 0 0;
            height: 32px;
            background: linear-gradient(to bottom, transparent, var(--surface));
            pointer-events: none;
            opacity: 0;
            transition: opacity var(--transition);
        }
        .svg-fade.visible {
            opacity: 1;
        }

        /* ---------- 放大提示按钮 ---------- */
        .zoom-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #ccc;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            cursor: pointer;
            opacity: 0;
            transform: translateY(-4px);
            transition: opacity var(--transition), transform var(--transition);
            z-index: 10;
            pointer-events: none;
        }
        .svg-wrapper:hover .zoom-badge,
        .svg-wrapper.zoomable .zoom-badge {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .zoom-badge:hover {
            background: rgba(0, 0, 0, 0.85);
            border-color: rgba(255, 255, 255, 0.25);
            color: #fff;
        }
        .zoom-badge svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* ---------- 查看原图按钮 ---------- */
        .view-original {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font-sans);
        }
        .view-original:hover {
            border-color: var(--border-strong);
            color: var(--text-primary);
            background: var(--surface-hover);
        }

        /* ---------- Lightbox ---------- */
        .lightbox {
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 250ms ease;
        }
        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            overflow: auto;
        }

        .lightbox-content svg {
            max-width: none;
            max-height: none;
            width: auto;
            height: auto;
            display: block;
            border-radius: 8px;
            cursor: zoom-out;
            box-shadow: 0 8px 64px rgba(0, 0, 0, 0.6);
        }

        /* ---------- Lightbox 自定义滚动条 ---------- */
        .lightbox-content::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .lightbox-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .lightbox-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }
        .lightbox-content::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* ---------- Lightbox 关闭按钮 ---------- */
        .lightbox-close {
            position: fixed;
            top: 8px;
            right: 8px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #ccc;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            z-index: 10001;
        }
        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        /* ---------- Lightbox 操作栏 ---------- */
        .lightbox-toolbar {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 4px;
            z-index: 10001;
        }
        .lightbox-toolbar button {
            display: flex;
            align-items: center;
            gap: 5px;
            background: transparent;
            border: 1px solid transparent;
            color: #bbb;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font-sans);
            font-weight: 500;
            white-space: nowrap;
        }
        .lightbox-toolbar button:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
            color: #fff;
        }
        .lightbox-toolbar button svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        /* ---------- 页脚 ---------- */
        .meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px 16px;
            padding: 8px 16px;
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.01em;
            flex-shrink: 0;
        }
        .meta .pill {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: var(--accent-dim);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 99px;
            font-weight: 500;
            font-size: 0.68rem;
            white-space: nowrap;
        }
        .meta .pill .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }
        .meta .prompt-hint {
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .divider {
            width: 1px;
            height: 10px;
            background: var(--border);
            flex-shrink: 0;
        }

        /* ---------- 响应式 ---------- */
        @media (max-width: 640px) {
            body {
                padding: 4px;
            }
            .card {
                max-height: calc(100vh - 8px);
            }
            .svg-wrapper {
                padding: 8px;
            }
            .meta {
                padding: 6px 10px;
                font-size: 0.62rem;
                gap: 4px 10px;
            }
            .meta .prompt-hint {
                max-width: 140px;
            }
            .lightbox-content {
                padding: 40px 8px;
            }
            .lightbox-toolbar {
                bottom: 6px;
                gap: 3px;
            }
            .lightbox-toolbar button {
                padding: 5px 8px;
                font-size: 0.65rem;
            }
            .zoom-badge {
                top: 4px;
                right: 4px;
                font-size: 0.62rem;
                padding: 3px 6px;
            }
        }
    </style>
</head>

    <div class="card">
        <div class="svg-wrapper" id="svgWrapper" title="点击放大查看">
            <div class="svg-fade" id="svgFade"></div>
            <div class="zoom-badge">

                点击放大
            </div>

  <defs>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#F0E6D2" surfaceScale="1.5" result="lit">
        <feDistantLight azimuth="45" elevation="55"/>
      </feDiffuseLighting>
      <feComposite in="SourceGraphic" in2="lit" operator="arithmetic" k1="0.8" k2="0.2" k3="0.1" k4="0"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&amp;display=swap');
      .title { font-family: 'Noto Serif SC', 'Source Han Serif SC', serif; font-size: 22px; font-weight: 900; fill: #2C3E50; letter-spacing: 4px; }
      .word { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 700; fill: #2C3E50; }
      .meta { font-family: 'Noto Serif SC', serif; font-size: 12px; fill: #8A7E6E; }
      .explanation { font-family: 'Noto Serif SC', serif; font-size: 16px; fill: #3D4A3A; line-height: 1.8; }
      .footnote { font-family: 'Noto Serif SC', serif; font-size: 11px; fill: #A8A090; font-style: italic; }
    </style>
  </defs>

  <!-- 背景：温润古籍 -->
  <rect width="400" height="600" fill="#F0E6D2"/>
  <rect width="400" height="600" fill="#D9CDB3" opacity="0.12" filter="url(#paper)"/>

  <!-- 顶部装饰线 -->
  <rect x="40" y="40" width="1.5" height="30" fill="#A8A090" opacity="0.6" rx="1"/>
  <rect x="358.5" y="40" width="1.5" height="30" fill="#A8A090" opacity="0.6" rx="1"/>

  <!-- 标题 -->
  <text x="200" y="65" text-anchor="middle" class="title">汉语新解</text>

  <!-- 古典分隔线 -->
  <line x1="60" y1="90" x2="340" y2="90" stroke="#A8A090" stroke-width="0.8" stroke-dasharray="4,6" opacity="0.5"/>
  <line x1="140" y1="94" x2="260" y2="94" stroke="#A8A090" stroke-width="0.5" opacity="0.3"/>

  <!-- 词汇 -->
  <text x="200" y="138" text-anchors="middle" class="word">楠姐</text>

  <!-- 副标题 -->
  <text x="200" y="162" text-anchor="middle" class="meta">NAN JIE</text>
  <text x="200" y="178" text-anchor="middle" class="meta">お姉さん</text>

  <!-- 两条细线框住释义区 -->
  <line x1="55" y1="200" x2="345" y2="200" stroke="#A8A090" stroke-width="0.5" opacity="0.3"/>
  
  <!-- 核心释义【完整显示，无截断】 -->
  <foreignObject x="45" y="215" width="310" height="160">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: 'Noto Serif CJK SC', 'Source Han Serif SC', serif; font-size: 16px; color: #3D4A3A; line-height: 1.9; text-align: justify; word-break: break-all; hyphens: auto;">
      楠，良木也，世人趋之若鹜，夸其材坚质密。姐，非血缘之长者也，乃世俗所加于年岁之标签。合而观之，不过是一截被寄予厚望的木头，在流水线上被赋予了沉重的价格，而无人过问它是否愿意成为栋梁。
    </div>
  </foreignObject>

  <!-- 下边线 -->
  <line x1="55" y1="380" x2="345" y2="380" stroke="#A8A090" stroke-width="0.5" opacity="0.3"/>

  <!-- 批判内核：抽象讽刺插画 -->
  <g transform="translate(200, 460)" opacity="0.75">
    <!-- 画一个被标签框住的人形轮廓，极具隐喻 -->
    <!-- 框 -->
    <rect x="-70" y="-55" width="140" height="110" fill="none" stroke="#2C3E50" stroke-width="1.8" rx="4" stroke-dasharray="8,3"/>
    <!-- 人物剪影（极简） -->
    <ellipse cx="0" cy="-30" rx="18" ry="22" fill="#2C3E50" opacity="0.7"/>
    <path d="M0,-8 L0,25" stroke="#2C3E50" stroke-width="2.5" opacity="0.8"/>
    <!-- 双手被虚线拉扯 -->
    <line x1="-25" y1="0" x2="-55" y2="-10" stroke="#A1574A" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="25" y1="0" x2="55" y2="-10" stroke="#A1574A" stroke-width="1.5" stroke-dasharray="3,2"/>
    <!-- 标签文字 -->
    <text x="-78" y="-62" font-family="'Noto Serif SC', serif" font-size="8" fill="#A1574A" font-weight="bold">珍贵</text>
    <text x="55" y="-62" font-family="'Noto Serif SC', serif" font-size="8" fill="#A1574A" font-weight="bold">坚韧</text>
    <text x="-78" y="62" font-family="'Noto Serif SC', serif" font-size="8" fill="#A1574A" font-weight="bold">成熟</text>
    <text x="55" y="62" font-family="'Noto Serif SC', serif" font-size="8" fill="#A1574A" font-weight="bold">懂事</text>
  </g>

  <!-- 极简总结语 -->
  <text x="200" y="570" text-anchor="middle" class="footnote">—— 被明码标价的牺牲，总被美其名曰“珍贵”。</text>
</svg>

        <div class="lightbox-toolbar">
            <button id="lightboxDownloadPNG">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                下载 PNG
            </button>
            <button id="lightboxDownloadSVG">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                下载 SVG
            </button>
        </div>
    </div>

    <script>
        (function() {
            var wrapper = document.getElementById('svgWrapper');
            var fade = document.getElementById('svgFade');
            var lightbox = document.getElementById('lightbox');
            var lightboxContent = document.getElementById('lightboxContent');
            var closeBtn = document.getElementById('lightboxClose');
            var downloadOriginal = document.getElementById('downloadOriginal');
            var lightboxDownloadPNG = document.getElementById('lightboxDownloadPNG');
            var lightboxDownloadSVG = document.getElementById('lightboxDownloadSVG');
            var svg = wrapper.querySelector(':scope > svg');

            // ---------- 检测 SVG 是否被裁切，显示底部渐变 ----------
            function checkOverflow() {
                if (!svg) return;
                var wrapperRect = wrapper.getBoundingClientRect();
                var svgRect = svg.getBoundingClientRect();
                if (svgRect.bottom > wrapperRect.bottom + 2) {
                    fade.classList.add('visible');
                    wrapper.classList.add('zoomable');
                } else {
                    fade.classList.remove('visible');
                    wrapper.classList.remove('zoomable');
                }
            }
            checkOverflow();
            window.addEventListener('resize', checkOverflow);

            // ---------- 获取 SVG 序列化字符串 ----------
            function getSvgString() {
                var clone = svg.cloneNode(true);
                return new XMLSerializer().serializeToString(clone);
            }

            // ---------- 打开 Lightbox ----------
            function openLightbox() {
                var srcSvg = wrapper.querySelector(':scope > svg');
                var dstSvg = lightboxContent.querySelector(':scope > svg');
                if (srcSvg && dstSvg) {
                    dstSvg.parentNode.replaceChild(srcSvg.cloneNode(true), dstSvg);
                }
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            // ---------- 关闭 Lightbox ----------
            function closeLightbox() {
                lightbox.classList.remove('active');
            }

            // ---------- 获取 SVG 原生尺寸 ----------
            function getSVGNativeSize() {
                var viewBox = svg.getAttribute('viewBox');
                if (viewBox) {
                    var parts = viewBox.trim().split(/[\s,]+/);
                    return { width: parseFloat(parts[2]), height: parseFloat(parts[3]) };
                }
                var w = svg.getAttribute('width');
                var h = svg.getAttribute('height');
                if (w && h) {
                    return { width: parseFloat(w), height: parseFloat(h) };
                }
                var rect = svg.getBoundingClientRect();
                return { width: rect.width, height: rect.height };
            }

            // ---------- 下载 PNG ----------
            function downloadPNG() {
                var svgString = getSvgString();
                var svgBlob = new Blob([svgString], { type: 'image/svg+xml' });
                var url = URL.createObjectURL(svgBlob);
                var img = new Image();
                img.onload = function() {
                    var size = getSVGNativeSize();
                    var scale = 2;
                    var canvas = document.createElement('canvas');
                    canvas.width = size.width * scale;
                    canvas.height = size.height * scale;
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob(function(blob) {
                        var pngUrl = URL.createObjectURL(blob);
                        var a = document.createElement('a');
                        a.href = pngUrl;
                        a.download = 'card.png';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        setTimeout(function() { URL.revokeObjectURL(pngUrl); }, 1000);
                    }, 'image/png');
                    URL.revokeObjectURL(url);
                };
                img.src = url;
            }

            // ---------- 下载 SVG ----------
            function downloadSvg() {
                var svgString = getSvgString();
                var blob = new Blob([svgString], { type: 'image/svg+xml' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'card.svg';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
            }

            // ---------- 事件绑定 ----------
            wrapper.addEventListener('click', function(e) {
                if (e.target.closest('.zoom-badge')) return;
                openLightbox();
            });

            wrapper.querySelector('.zoom-badge').addEventListener('click', function(e) {
                e.stopPropagation();
                openLightbox();
            });

            closeBtn.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', function(e) {
                if (e.target === lightbox) closeLightbox();
            });

            lightboxContent.addEventListener('click', function(e) {
                if (e.target === lightboxContent || e.target.tagName === 'svg') closeLightbox();
            });

            downloadOriginal.addEventListener('click', function(e) {
                e.stopPropagation();
                downloadPNG();
            });

            lightboxDownloadPNG.addEventListener('click', downloadPNG);
            lightboxDownloadSVG.addEventListener('click', downloadSvg);

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                    closeLightbox();
                }
            });
        })();
    </script>
</body>
